<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="playing-card-styles.css">
</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left spade">♠</div>
      <div class="middle spade">♠</div>
      <div class="right spade">♠</div>
    </div>

    <div class="card">
      <div class="left club">♣</div>
      <div class="middle club">♣</div>
      <div class="right club">♣</div>
    </div>

    <div class="card">
      <div class="left heart">♥</div>
      <div class="middle heart">♥</div>
      <div class="right heart">♥</div>
    </div>

    <div class="card">
      <div class="left diamond">♦</div>
      <div class="middle diamond">♦</div>
      <div class="right diamond">♦</div>
    </div>
  </main>
</body>

</html>
